name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    permissions:
      id-token: write
      contents: read
    uses: xlmriosx/shared-library/.github/workflows/AWS-S3-deploy.yml@main
    with:
      working-directory: '.'
      node-version: '20'
      aws-region: 'sa-east-1'
      s3-bucket: 'argly-web-static'
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
